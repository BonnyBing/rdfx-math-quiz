<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>天文望远镜全真模拟</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        background: #03060d;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei',
          sans-serif;
        background: #03060d;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        color: #e2e8f0;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* ── Header ── */
      header {
        flex-shrink: 0;
        text-align: center;
        padding: 6px 16px 4px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(3, 6, 13, 0.95);
      }
      .page-title {
        font-size: clamp(0.95rem, 3.5vw, 1.4rem);
        font-weight: 700;
        background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.02em;
      }
      .page-subtitle {
        color: #64748b;
        font-size: 0.6rem;
        margin-top: 1px;
      }

      /* ── View Section ── */
      #view-section {
        flex: 1;
        min-height: 0;
        position: relative;
        background: #000;
        overflow: hidden;
      }
      #scene-canvas,
      #overlay-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #overlay-canvas {
        pointer-events: none;
        z-index: 2;
      }

      .focus-status {
        position: absolute;
        bottom: 10px;
        left: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.68rem;
        color: #4b5563;
        z-index: 10;
        pointer-events: none;
      }
      .focus-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #dc2626;
        transition:
          background 0.5s,
          box-shadow 0.5s;
      }
      .focus-dot.on {
        background: #16a34a;
        box-shadow: 0 0 6px #16a34a;
      }

      /* ── Scope Section ── */
      #scope-section {
        flex-shrink: 0;
        height: clamp(232px, 43vh, 300px);
        background: linear-gradient(180deg, #060e1a 0%, #0a1525 100%);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding: 7px 13px 5px;
        display: flex;
        flex-direction: column;
        gap: 0;
        overflow: hidden;
      }

      /* ── Focus button (top of scope section) ── */
      .focus-top {
        flex-shrink: 0;
        margin-bottom: 6px;
      }
      .focus-btn {
        width: 100%;
        padding: 7px 12px;
        background: linear-gradient(135deg, #1d4ed8, #6d28d9);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 0.76rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        white-space: nowrap;
        box-shadow: 0 2px 10px rgba(29, 78, 216, 0.35);
        letter-spacing: 0.02em;
      }
      .focus-btn:hover:not(:disabled) {
        opacity: 0.9;
        box-shadow: 0 4px 14px rgba(29, 78, 216, 0.5);
      }
      .focus-btn:active:not(:disabled) {
        transform: scale(0.99);
      }
      .focus-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        box-shadow: none;
      }

      /* Telescope wrap */
      .scope-wrap {
        flex-shrink: 0;
        height: 82px;
        width: 100%;
      }
      .scope-wrap svg {
        overflow: visible;
        display: block;
      }

      /* Separator */
      .sep {
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
        margin: 5px 0;
      }

      /* Lens selector rows */
      .lens-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
        padding: 2px 0;
      }
      .row-label {
        font-size: 0.63rem;
        color: #374151;
        width: 24px;
        text-align: center;
        flex-shrink: 0;
        line-height: 1.3;
      }
      .lens-options {
        display: flex;
        gap: 4px;
        flex: 1;
      }
      .lens-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 5px 2px 4px;
        background: rgba(255, 255, 255, 0.03);
        border: 1.5px solid rgba(255, 255, 255, 0.07);
        border-radius: 8px;
        cursor: pointer;
        min-width: 0;
        transition:
          background 0.15s,
          border-color 0.15s,
          box-shadow 0.15s,
          transform 0.1s;
      }
      .lens-card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(96, 165, 250, 0.25);
      }
      .lens-card:active {
        transform: scale(0.93);
      }
      .lens-card.selected {
        background: rgba(96, 165, 250, 0.11);
        border-color: #60a5fa;
        box-shadow: 0 0 10px rgba(96, 165, 250, 0.22);
      }
      .lens-card.disabled {
        opacity: 0.28;
        pointer-events: none;
      }
      .lens-kind {
        font-size: 0.52rem;
        color: #2d3748;
        white-space: nowrap;
      }
      .lens-card.selected .lens-kind {
        color: #3b82f6;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spin-icon {
        display: inline-block;
        animation: spin 0.75s linear infinite;
      }

      @keyframes pulseRing {
        0% {
          transform: scale(0.6);
          opacity: 1;
        }
        100% {
          transform: scale(1.8);
          opacity: 0;
        }
      }
      .focus-ring-anim {
        position: absolute;
        border: 2px solid #60a5fa;
        border-radius: 50%;
        pointer-events: none;
        z-index: 5;
        animation: pulseRing 0.9s ease-out forwards;
      }

      @media (max-width: 900px) {
        #scope-section {
          height: clamp(220px, 39vh, 290px);
          padding: 7px 10px 5px;
        }
        .scope-wrap {
          height: 74px;
        }
        .lens-card {
          padding: 4px 2px 3px;
        }
      }

      @media (max-width: 640px) {
        header {
          padding: 5px 10px 3px;
        }
        .page-title {
          font-size: clamp(0.88rem, 4vw, 1.1rem);
        }
        .page-subtitle {
          font-size: 0.55rem;
        }
        #scope-section {
          height: clamp(204px, 35vh, 252px);
          padding: 6px 8px 4px;
        }
        .focus-top {
          margin-bottom: 5px;
        }
        .focus-btn {
          padding: 6px 10px;
          font-size: 0.72rem;
        }
        .scope-wrap {
          height: 68px;
        }
        .sep {
          margin: 4px 0;
        }
        .row-label {
          width: 22px;
          font-size: 0.58rem;
        }
        .lens-options {
          gap: 3px;
        }
        .lens-kind {
          font-size: 0.48rem;
        }
        .focus-status {
          left: 8px;
          bottom: 8px;
          font-size: 0.62rem;
        }
      }

      @media (max-height: 760px) and (orientation: landscape) {
        header {
          padding: 4px 10px 2px;
        }
        .page-title {
          font-size: 0.9rem;
        }
        .page-subtitle {
          display: none;
        }
        #scope-section {
          height: clamp(164px, 31vh, 210px);
          padding: 5px 8px 4px;
        }
        .focus-top {
          margin-bottom: 4px;
        }
        .focus-btn {
          padding: 5px 10px;
          font-size: 0.68rem;
        }
        .scope-wrap {
          height: 54px;
        }
        .lens-row {
          padding: 1px 0;
        }
        .lens-card {
          padding: 3px 2px 2px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="page-title">天文望远镜全真模拟</div>
      <div class="page-subtitle">红框会自动框出当前倍率下能完整看到的格子区域</div>
    </header>

    <div id="view-section">
      <canvas id="scene-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div class="focus-status">
        <div class="focus-dot" id="focus-dot"></div>
        <span id="focus-text">未对焦</span>
      </div>
    </div>

    <div id="scope-section">
      <!-- Auto-focus button (topmost) -->
      <div class="focus-top">
        <button class="focus-btn" id="focus-btn" onclick="triggerFocus()">
          <span id="focus-icon">⊙</span>
          <span id="focus-label">自动对焦</span>
        </button>
      </div>

      <!-- Telescope SVG -->
      <div class="scope-wrap">
        <svg
          id="scope-svg"
          width="100%"
          height="82"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </div>

      <div class="sep"></div>

      <!-- Eyepiece selector (no numbers) -->
      <div class="lens-row">
        <div class="row-label">目<br />镜</div>
        <div class="lens-options" id="ep-options"></div>
      </div>

      <!-- Objective selector (no numbers) -->
      <div class="lens-row">
        <div class="row-label">物<br />镜</div>
        <div class="lens-options" id="obj-options"></div>
      </div>
    </div>

    <script>
      'use strict'

      /* ══════════════════════════════════════════════════════
   天文望远镜全真模拟  v3.0
   ══════════════════════════════════════════════════════ */

      // ── Lens Data ────────────────────────────────────────
      // 焦距越短 → 镜片弯曲度越大 → 越厚（物理正确）
      const EYEPIECES = [
        { f: 5, kind: '高倍', thick: 0.47 }, // 5mm  焦距最短 → 最厚（左）
        { f: 10, kind: '中倍', thick: 0.3 }, // 10mm 中等
        { f: 20, kind: '广角', thick: 0.15 }, // 20mm 焦距最长 → 最薄（右）
      ]
      const OBJECTIVES = [
        { f: 100, kind: '短焦', thick: 0.38 },
        { f: 200, kind: '中焦', thick: 0.22 },
        { f: 400, kind: '长焦', thick: 0.1 },
      ]

      // ── State ────────────────────────────────────────────
      const S = {
        ep: 20,
        obj: 100,
        mode: 'scope',
        focused: false,
        focusing: false,
        blur: 12,
        showFocal: false,
        nakedZoom: 1,
        nakedOffsetX: 0,
        nakedOffsetY: 0,
      }

      let pinchStartDist = 0
      let pinchStartZoom = 1
      let dragStartX = 0
      let dragStartY = 0
      let dragOriginX = 0
      let dragOriginY = 0
      let isDraggingNaked = false

      function toggleFocalShow() {
        S.showFocal = !S.showFocal
        const btn = document.getElementById('mode-focal-btn')
        if (S.showFocal) {
          btn.innerHTML = '📐 隐藏焦距'
          btn.classList.add('active')
        } else {
          btn.innerHTML = '📐 显示焦距'
          btn.classList.remove('active')
        }
        buildLensCards()
      }

      function getMag() {
        return S.obj / S.ep
      }
      function getNakedMag() {
        return S.nakedZoom
      }
      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v))
      }

      function getObservationSide() {
        // 取圆形视野里稳定、完整可见的正方形观察区。
        return Math.sqrt(2) * VR * 0.9
      }

      function getGridCellSize(mag) {
        // 目标关系：
        // 5x  -> 32 x 32
        // 10x -> 16 x 16
        // 20x -> 8 x 8
        // 40x -> 4 x 4
        // 80x -> 2 x 2
        // 因此每边完整格数 = 160 / 放大倍数。
        return getObservationSide() / (160 / mag)
      }

      function getHighlightedCellBox(mag) {
        const sp = getGridCellSize(mag)
        if (!sp) return null

        const visibleCellsPerSide = Math.max(1, Math.round(getObservationSide() / sp))
        const sidePx = visibleCellsPerSide * sp

        return {
          cellSize: sp,
          cellsPerSide: visibleCellsPerSide,
          sidePx,
          left: -sidePx / 2,
          top: -sidePx / 2,
        }
      }

      function drawGroupedCountingAid(ctx, box) {
        const { left, top, sidePx, cellSize, cellsPerSide } = box
        const right = left + sidePx
        const bottom = top + sidePx

        // 红框外、圆视野内统一压暗，明确规则：只数红框里的完整格子。
        ctx.save()
        ctx.fillStyle = 'rgba(10, 18, 32, 0.16)'
        ctx.fillRect(-VR, -VR, left + VR, VR * 2)
        ctx.fillRect(right, -VR, VR - right, VR * 2)
        ctx.fillRect(left, -VR, sidePx, top + VR)
        ctx.fillRect(left, bottom, sidePx, VR - bottom)
        ctx.restore()

        ctx.save()
        ctx.beginPath()
        ctx.rect(left, top, sidePx, sidePx)
        ctx.clip()

        // 先把 4x4 小组做成交替浅色块，学生可以直接“数组”而不是数单格。
        if (cellsPerSide >= 4) {
          const smallGroup = 4
          const groupPx = cellSize * smallGroup
          const smallGroupCount = Math.floor(cellsPerSide / smallGroup)
          for (let gy = 0; gy < smallGroupCount; gy++) {
            for (let gx = 0; gx < smallGroupCount; gx++) {
              if ((gx + gy) % 2 === 0) continue
              ctx.fillStyle = 'rgba(59, 130, 246, 0.08)'
              ctx.fillRect(
                left + gx * groupPx,
                top + gy * groupPx,
                groupPx,
                groupPx,
              )
            }
          }
        }

        // 再把 8x8 大组画出来，让学生优先数大组。
        if (cellsPerSide >= 8) {
          const largeGroup = 8
          ctx.beginPath()
          for (let i = 0; i <= cellsPerSide; i++) {
            if (i === 0 || i === cellsPerSide || i % largeGroup !== 0) continue
            const x = left + i * cellSize
            const y = top + i * cellSize
            ctx.moveTo(x, top)
            ctx.lineTo(x, bottom)
            ctx.moveTo(left, y)
            ctx.lineTo(right, y)
          }
          ctx.strokeStyle = 'rgba(29, 78, 216, 0.42)'
          ctx.lineWidth = Math.max(1.8, Math.min(3.4, cellSize * 0.18))
          ctx.stroke()
        }

        if (cellsPerSide >= 4) {
          ctx.beginPath()
          for (let i = 0; i <= cellsPerSide; i++) {
            if (i === 0 || i === cellsPerSide || i % 4 !== 0) continue
            const x = left + i * cellSize
            const y = top + i * cellSize
            ctx.moveTo(x, top)
            ctx.lineTo(x, bottom)
            ctx.moveTo(left, y)
            ctx.lineTo(right, y)
          }
          ctx.strokeStyle = 'rgba(37, 99, 235, 0.2)'
          ctx.lineWidth = Math.max(1.1, Math.min(2.1, cellSize * 0.1))
          ctx.stroke()
        }

        // 红框内做很轻的提亮，形成观察窗口。
        ctx.fillStyle = 'rgba(255, 255, 255, 0.04)'
        ctx.fillRect(left, top, sidePx, sidePx)

        ctx.save()
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.72)'
        ctx.setLineDash([Math.max(8, cellSize * 1.2), Math.max(6, cellSize)])
        ctx.lineWidth = Math.max(1.8, Math.min(3, cellSize * 0.16))
        ctx.strokeRect(left, top, sidePx, sidePx)
        ctx.restore()

        // 在每个 8x8 大组的中心加一个很淡的定位点，帮助学生快速分组。
        if (cellsPerSide >= 8) {
          const largeGroupPx = cellSize * 8
          const largeGroupCount = Math.floor(cellsPerSide / 8)
          ctx.fillStyle = 'rgba(37, 99, 235, 0.18)'
          for (let gy = 0; gy < largeGroupCount; gy++) {
            for (let gx = 0; gx < largeGroupCount; gx++) {
              const cx = left + gx * largeGroupPx + largeGroupPx / 2
              const cy = top + gy * largeGroupPx + largeGroupPx / 2
              ctx.beginPath()
              ctx.arc(cx, cy, Math.max(1.6, Math.min(3.5, cellSize * 0.18)), 0, Math.PI * 2)
              ctx.fill()
            }
          }
        }

        ctx.restore()
      }

      function drawObservationFrame(ctx, box) {
        const { left, top, sidePx } = box
        const right = left + sidePx
        const bottom = top + sidePx
        const corner = Math.max(16, Math.min(36, sidePx * 0.12))

        ctx.save()
        ctx.shadowColor = 'rgba(255, 80, 80, 0.28)'
        ctx.shadowBlur = 14
        ctx.strokeStyle = 'rgba(255, 88, 88, 0.98)'
        ctx.lineWidth = 4
        ctx.lineCap = 'round'
        ctx.lineJoin = 'round'

        ;[
          [left, top, left + corner, top, left, top + corner],
          [right, top, right - corner, top, right, top + corner],
          [left, bottom, left + corner, bottom, left, bottom - corner],
          [right, bottom, right - corner, bottom, right, bottom - corner],
        ].forEach(([x1, y1, x2, y2, x3, y3]) => {
          ctx.beginPath()
          ctx.moveTo(x1, y1)
          ctx.lineTo(x2, y2)
          ctx.moveTo(x1, y1)
          ctx.lineTo(x3, y3)
          ctx.stroke()
        })

        ctx.shadowBlur = 0
        ctx.strokeStyle = 'rgba(255, 88, 88, 0.26)'
        ctx.lineWidth = 2
        ctx.strokeRect(left, top, sidePx, sidePx)

        // 四边中点再补短标记，避免学生把圆视野边缘误当成计数边界。
        const midMark = Math.max(12, Math.min(24, sidePx * 0.08))
        ctx.strokeStyle = 'rgba(255, 88, 88, 0.9)'
        ctx.lineWidth = 3
        ctx.beginPath()
        ctx.moveTo((left + right) / 2 - midMark, top)
        ctx.lineTo((left + right) / 2 + midMark, top)
        ctx.moveTo((left + right) / 2 - midMark, bottom)
        ctx.lineTo((left + right) / 2 + midMark, bottom)
        ctx.moveTo(left, (top + bottom) / 2 - midMark)
        ctx.lineTo(left, (top + bottom) / 2 + midMark)
        ctx.moveTo(right, (top + bottom) / 2 - midMark)
        ctx.lineTo(right, (top + bottom) / 2 + midMark)
        ctx.stroke()
        ctx.restore()
      }

      // ── Squared Paper Grid Rendering ─────────────────────────────
      function drawGridBoard(ctx, cx, cy, mag, offsetX = 0, offsetY = 0) {
        const sp = getGridCellSize(mag)
        const numCellsHalf = 80
        const boardR = numCellsHalf * sp
        const gridColor = '84, 136, 206'
        const majorGridColor = '58, 104, 178'

        ctx.save()
        ctx.translate(cx + offsetX, cy + offsetY)

        // 计算当前坐标系下真实可见区域（肉眼模式 offset 不为零时非对称）
        let clipL, clipR, clipT, clipB
        if (S.mode === 'naked') {
          const visL = -(cx + offsetX)
          const visR = CW - (cx + offsetX)
          const visT = -(cy + offsetY)
          const visB = CH - (cy + offsetY)
          clipL = Math.max(-boardR, visL - sp)
          clipR = Math.min(boardR, visR + sp)
          clipT = Math.max(-boardR, visT - sp)
          clipB = Math.min(boardR, visB + sp)
        } else {
          const r = Math.min(boardR, VR + sp)
          clipL = -r
          clipR = r
          clipT = -r
          clipB = r
        }

        // 方格纸底色
        ctx.fillStyle = '#f8fbff'
        ctx.fillRect(clipL, clipT, clipR - clipL, clipB - clipT)

        const startC = Math.max(-numCellsHalf, Math.floor(clipL / sp))
        const endC = Math.min(numCellsHalf, Math.ceil(clipR / sp))
        const startR = Math.max(-numCellsHalf, Math.floor(clipT / sp))
        const endR = Math.min(numCellsHalf, Math.ceil(clipB / sp))

        // 统一细线网格
        ctx.beginPath()
        for (let c = startC; c <= endC; c++) {
          const x = c * sp
          ctx.moveTo(x, clipT)
          ctx.lineTo(x, clipB)
        }
        for (let r = startR; r <= endR; r++) {
          const y = r * sp
          ctx.moveTo(clipL, y)
          ctx.lineTo(clipR, y)
        }
        ctx.lineWidth = Math.min(1.2, Math.max(0.45, sp * 0.03))
        ctx.strokeStyle = `rgba(${gridColor}, 0.58)`
        ctx.stroke()

        // 全局网格也按 4 / 8 分组，和课堂数边长的思路保持一致。
        if (sp >= 2) {
          ctx.beginPath()
          for (let i = startC; i <= endC; i++) {
            if (i === 0 || i % 4 !== 0) continue
            const x = i * sp
            ctx.moveTo(x, clipT)
            ctx.lineTo(x, clipB)
          }
          for (let i = startR; i <= endR; i++) {
            if (i === 0 || i % 4 !== 0) continue
            const y = i * sp
            ctx.moveTo(clipL, y)
            ctx.lineTo(clipR, y)
          }
          ctx.lineWidth = Math.min(1.2, Math.max(0.65, sp * 0.028))
          ctx.strokeStyle = `rgba(${majorGridColor}, 0.5)`
          ctx.stroke()
        }

        if (sp >= 2) {
          ctx.beginPath()
          for (let i = startC; i <= endC; i++) {
            if (i === 0 || i % 8 !== 0) continue
            const x = i * sp
            ctx.moveTo(x, clipT)
            ctx.lineTo(x, clipB)
          }
          for (let i = startR; i <= endR; i++) {
            if (i === 0 || i % 8 !== 0) continue
            const y = i * sp
            ctx.moveTo(clipL, y)
            ctx.lineTo(clipR, y)
          }
          ctx.lineWidth = Math.min(1.9, Math.max(0.95, sp * 0.04))
          ctx.strokeStyle = `rgba(${majorGridColor}, 0.98)`
          ctx.stroke()
        }

        // 中心十字略深一点，便于观察
        ctx.beginPath()
        ctx.moveTo(0, clipT)
        ctx.lineTo(0, clipB)
        ctx.moveTo(clipL, 0)
        ctx.lineTo(clipR, 0)
        ctx.lineWidth = Math.min(1.4, Math.max(0.6, sp * 0.04))
        ctx.strokeStyle = `rgba(${gridColor}, 1)`
        ctx.stroke()

        // 纸面边框
        const viewRX = S.mode === 'naked' ? CW / 2 : VR
        const viewRY = S.mode === 'naked' ? CH / 2 : VR
        if (boardR <= viewRX || boardR <= viewRY) {
          ctx.lineWidth = Math.max(1.5, sp * 0.05)
          ctx.strokeStyle = `rgba(${gridColor}, 1)`
          ctx.strokeRect(-boardR, -boardR, boardR * 2, boardR * 2)
        }

        if (S.mode === 'scope') {
          const box = getHighlightedCellBox(mag)
          if (box) {
            drawGroupedCountingAid(ctx, box)
            drawObservationFrame(ctx, box)
          }
        }

        ctx.restore()
      }

      // ── Canvas ───────────────────────────────────────────
      const sceneCvs = document.getElementById('scene-canvas')
      const sceneCtx = sceneCvs.getContext('2d')
      const overlayCvs = document.getElementById('overlay-canvas')
      const overlayCtx = overlayCvs.getContext('2d')
      let CW = 0,
        CH = 0,
        VR = 0,
        DPR = 1

      function applyViewInteractionMode() {
        const sec = document.getElementById('view-section')
        if (!sec) return
        sec.style.touchAction = S.mode === 'naked' ? 'none' : 'manipulation'
        sec.style.cursor = S.mode === 'naked' && S.nakedZoom > 1 ? 'grab' : ''
      }

      function resizeCanvases() {
        const sec = document.getElementById('view-section')
        CW = sec.clientWidth
        CH = sec.clientHeight
        DPR = Math.min(window.devicePixelRatio || 1, 2)
        sceneCvs.width = Math.max(1, Math.round(CW * DPR))
        sceneCvs.height = Math.max(1, Math.round(CH * DPR))
        overlayCvs.width = Math.max(1, Math.round(CW * DPR))
        overlayCvs.height = Math.max(1, Math.round(CH * DPR))
        sceneCtx.setTransform(DPR, 0, 0, DPR, 0, 0)
        overlayCtx.setTransform(DPR, 0, 0, DPR, 0, 0)
        VR = Math.min(Math.min(CW, CH) * 0.43, 280)
        clampNakedOffsets()
        applyViewInteractionMode()
        drawOverlay()
      }

      // ── Seeded RNG ───────────────────────────────────────
      function makeRng(seed) {
        let s = (seed ^ 0xdeadbeef) >>> 0
        return () => {
          s = Math.imul(s ^ (s >>> 15), s | 1)
          s ^= s + Math.imul(s ^ (s >>> 7), s | 61)
          return ((s ^ (s >>> 14)) >>> 0) / 0xffffffff
        }
      }

      // ── Telescope Stars ──────────────────────────────────
      const TELE_STARS = (() => {
        const rng = makeRng(8765)
        return Array.from({ length: 280 }, () => {
          const a = rng() * Math.PI * 2,
            d = 0.55 + rng() * 3.0
          return {
            nx: Math.cos(a) * d,
            ny: Math.sin(a) * d,
            size: 0.3 + rng() * 1.2,
            bright: 0.18 + rng() * 0.72,
            tw: 0.6 + rng() * 2.5,
            tp: rng() * Math.PI * 2,
          }
        })
      })()

      // ── Naked Eye Stars ──────────────────────────────────
      const NAKED_STARS = (() => {
        const rng = makeRng(13579)
        const stars = []
        for (let i = 0; i < 520; i++) {
          stars.push({
            nx: rng() * 2 - 1,
            ny: rng() * 2 - 1,
            size: 0.2 + Math.pow(rng(), 2.5) * 2.5,
            bright: 0.08 + Math.pow(rng(), 1.8) * 0.72,
            tw: 0.4 + rng() * 3,
            tp: rng() * Math.PI * 2,
            ci: Math.floor(rng() * 12),
          })
        }
        const mwRng = makeRng(24680)
        for (let i = 0; i < 600; i++) {
          const t = mwRng() * 2.4 - 1.2,
            perp = (mwRng() - 0.5) * 0.45
          const nx = t * 0.88 + perp * 0.46,
            ny = t * 0.22 + perp * 0.92 - 0.15
          if (Math.abs(nx) < 1 && Math.abs(ny) < 1)
            stars.push({
              nx,
              ny,
              size: 0.2 + mwRng() * 0.4,
              bright: 0.03 + mwRng() * 0.09,
              tw: 0.3,
              tp: mwRng() * Math.PI * 2,
              ci: 0,
            })
        }
        return stars
      })()
      const STAR_COLORS = [
        '#b8d4ff',
        '#c8dcff',
        '#dce8ff',
        '#eaf0ff',
        '#ffffff',
        '#ffffff',
        '#ffffff',
        '#fffce8',
        '#fff4d0',
        '#ffe8b4',
        '#ffd0a0',
        '#ffc090',
      ]

      // ── Overlay ──────────────────────────────────────────
      function drawOverlay() {
        if (!CW || !CH) return
        overlayCtx.clearRect(0, 0, CW, CH)
        const cx = CW / 2,
          cy = CH / 2

        if (S.mode === 'naked') {
          const vg = overlayCtx.createRadialGradient(
            cx,
            cy,
            Math.min(CW, CH) * 0.3,
            cx,
            cy,
            Math.max(CW, CH) * 0.72,
          )
          vg.addColorStop(0, 'rgba(0,0,0,0)')
          vg.addColorStop(1, 'rgba(0,0,0,0.55)')
          overlayCtx.fillStyle = vg
          overlayCtx.fillRect(0, 0, CW, CH)
          return
        }

        // Black mask outside circle
        overlayCtx.save()
        overlayCtx.fillStyle = '#000'
        overlayCtx.beginPath()
        overlayCtx.rect(0, 0, CW, CH)
        overlayCtx.arc(cx, cy, VR, 0, Math.PI * 2, true)
        overlayCtx.fill('evenodd')

        // Inner vignette
        const vig = overlayCtx.createRadialGradient(
          cx,
          cy,
          VR * 0.55,
          cx,
          cy,
          VR * 0.97,
        )
        vig.addColorStop(0, 'rgba(0,0,0,0)')
        vig.addColorStop(1, 'rgba(0,0,0,0.62)')
        overlayCtx.beginPath()
        overlayCtx.arc(cx, cy, VR, 0, Math.PI * 2)
        overlayCtx.fillStyle = vig
        overlayCtx.fill()

        // Chrome rings
        ;[
          { r: VR, lw: 2.0, c: 'rgba(70,100,140,0.5)' },
          { r: VR + 5, lw: 9, c: 'rgba(15,24,40,0.97)' },
          { r: VR + 10, lw: 4, c: 'rgba(35,52,78,0.88)' },
          { r: VR + 13, lw: 1.5, c: 'rgba(55,80,115,0.55)' },
          { r: VR + 15, lw: 0.8, c: 'rgba(80,112,155,0.25)' },
        ].forEach(({ r, lw, c }) => {
          overlayCtx.beginPath()
          overlayCtx.arc(cx, cy, r, 0, Math.PI * 2)
          overlayCtx.strokeStyle = c
          overlayCtx.lineWidth = lw
          overlayCtx.stroke()
        })

        // Glare arc
        const arc = overlayCtx.createLinearGradient(
          cx - VR,
          cy - VR,
          cx + VR * 0.5,
          cy - VR * 0.3,
        )
        arc.addColorStop(0, 'rgba(255,255,255,0)')
        arc.addColorStop(0.35, 'rgba(255,255,255,0.09)')
        arc.addColorStop(1, 'rgba(255,255,255,0)')
        overlayCtx.beginPath()
        overlayCtx.arc(cx, cy, VR + 7, Math.PI * 1.1, Math.PI * 1.8)
        overlayCtx.strokeStyle = arc
        overlayCtx.lineWidth = 8
        overlayCtx.stroke()

        // Crosshair
        const chL = VR * 0.07
        overlayCtx.setLineDash([2.5, 3.5])
        overlayCtx.strokeStyle = 'rgba(255,255,255,0.055)'
        overlayCtx.lineWidth = 0.75
        overlayCtx.beginPath()
        overlayCtx.moveTo(cx - chL, cy)
        overlayCtx.lineTo(cx + chL, cy)
        overlayCtx.moveTo(cx, cy - chL)
        overlayCtx.lineTo(cx, cy + chL)
        overlayCtx.stroke()
        overlayCtx.setLineDash([])
        overlayCtx.restore()
      }

      // ── Scene Rendering ──────────────────────────────────
      function renderScene(ts) {
        requestAnimationFrame(renderScene)
        if (!CW || !CH) return
        const t = ts / 1000
        sceneCtx.fillStyle = '#000207'
        sceneCtx.fillRect(0, 0, CW, CH)
        if (S.mode === 'naked') renderNakedEye(t)
        else renderTelescopeView(t)
        sceneCvs.style.filter =
          S.blur > 0.06 ? `blur(${S.blur.toFixed(2)}px)` : 'none'
      }

      function renderNakedEye(t) {
        const cx = CW / 2,
          cy = CH / 2
        const zoom = getNakedMag()
        const offsetX = S.nakedOffsetX
        const offsetY = S.nakedOffsetY
        const sky = sceneCtx.createRadialGradient(
          cx,
          cy - CH * 0.3,
          0,
          cx,
          cy,
          Math.max(CW, CH) * 0.8,
        )
        sky.addColorStop(0, '#050a18')
        sky.addColorStop(0.5, '#030710')
        sky.addColorStop(1, '#010308')
        sceneCtx.fillStyle = sky
        sceneCtx.fillRect(0, 0, CW, CH)
        for (const s of NAKED_STARS) {
          const sx = cx + offsetX + s.nx * CW * 0.52 * zoom,
            sy = cy + offsetY + s.ny * CH * 0.52 * zoom
          if (sx < -5 || sx > CW + 5 || sy < -5 || sy > CH + 5) continue
          const tw = 0.7 + 0.3 * Math.sin(t * s.tw + s.tp)
          sceneCtx.save()
          sceneCtx.globalAlpha = s.bright * tw
          if (s.size > 1.0 && s.bright > 0.35) {
            const glow = sceneCtx.createRadialGradient(
              sx,
              sy,
              0,
              sx,
              sy,
              s.size * 3,
            )
            glow.addColorStop(0, STAR_COLORS[s.ci || 0])
            glow.addColorStop(1, 'rgba(0,0,0,0)')
            sceneCtx.beginPath()
            sceneCtx.arc(sx, sy, s.size * 3, 0, Math.PI * 2)
            sceneCtx.fillStyle = glow
            sceneCtx.fill()
          }
          sceneCtx.beginPath()
          sceneCtx.arc(sx, sy, s.size, 0, Math.PI * 2)
          sceneCtx.fillStyle = STAR_COLORS[s.ci || 4]
          sceneCtx.fill()
          sceneCtx.restore()
        }
        drawGridBoard(sceneCtx, cx, cy, zoom, offsetX, offsetY)
      }

      function renderTelescopeView(t) {
        const cx = CW / 2,
          cy = CH / 2,
          mag = getMag()

        if (mag <= 20) {
          const sc = mag / 10
          for (const s of TELE_STARS) {
            const sx = cx + s.nx * VR * sc,
              sy = cy + s.ny * VR * sc
            const tw = 0.62 + 0.38 * Math.sin(t * s.tw + s.tp)
            sceneCtx.save()
            sceneCtx.globalAlpha = s.bright * tw
            if (s.size > 0.8 && s.bright > 0.45) {
              const glow = sceneCtx.createRadialGradient(
                sx,
                sy,
                0,
                sx,
                sy,
                s.size * 2.5,
              )
              glow.addColorStop(0, 'rgba(190,210,255,0.65)')
              glow.addColorStop(1, 'rgba(0,0,0,0)')
              sceneCtx.beginPath()
              sceneCtx.arc(sx, sy, s.size * 2.5, 0, Math.PI * 2)
              sceneCtx.fillStyle = glow
              sceneCtx.fill()
            }
            sceneCtx.beginPath()
            sceneCtx.arc(sx, sy, s.size, 0, Math.PI * 2)
            sceneCtx.fillStyle = '#fff'
            sceneCtx.fill()
            sceneCtx.restore()
          }
        }

        drawGridBoard(sceneCtx, cx, cy, mag)
      }

      // ── White Telescope SVG  (目镜在左 / 物镜在右) ──────────
      function buildScopeSVG() {
        const svg = document.getElementById('scope-svg')
        const ns = 'http://www.w3.org/2000/svg'
        svg.innerHTML = ''

        const TW = svg.parentElement.clientWidth || 440
        const TH = 82
        svg.setAttribute('viewBox', `0 0 ${TW} ${TH}`)

        const ep = EYEPIECES.find((e) => e.f === S.ep)
        const obj = OBJECTIVES.find((o) => o.f === S.obj)

        // ── Geometry (eyepiece LEFT → objective RIGHT) ──
        const midY = 43
        const eyeR = 12 // eye cup radius
        const epH = 14 // eyepiece barrel half-height
        const focH = 18 // focuser block half-height
        const mH = 16 // main tube half-height
        const objH = 24 // objective cell half-height
        const dewH = 27 // dew shield half-height

        const L = TW * 0.025 // left margin
        const eyeCX = L + eyeR // eye cup center
        const epBSt = eyeCX - 4 // eyepiece barrel start
        const epBW = 28
        const epBEnd = epBSt + epBW
        const focW = 24
        const focSt = epBEnd
        const focEnd = focSt + focW
        const taperW = 10 // focuser → tube taper
        const mainSt = focEnd + taperW
        const mainW = TW * 0.5
        const mainEnd = mainSt + mainW
        const objTaperW = 10 // tube → objective taper
        const objBW = 22
        const objSt = mainEnd + objTaperW
        const objEnd = objSt + objBW
        const dewW = 44
        const dewSt = objEnd
        const dewEnd = dewSt + dewW

        const defs = document.createElementNS(ns, 'defs')

        function lg(id, stops) {
          const g = document.createElementNS(ns, 'linearGradient')
          g.setAttribute('id', id)
          g.setAttribute('x1', '0')
          g.setAttribute('y1', '0')
          g.setAttribute('x2', '0')
          g.setAttribute('y2', '1')
          stops.forEach(([o, c]) => {
            const s = document.createElementNS(ns, 'stop')
            s.setAttribute('offset', o)
            s.setAttribute('stop-color', c)
            g.appendChild(s)
          })
          return g
        }

        defs.appendChild(
          lg('gWhiteTube', [
            ['0%', '#b8c4cc'],
            ['8%', '#d8e2ea'],
            ['20%', '#eef3f7'],
            ['32%', '#f8fbfd'],
            ['46%', '#ffffff'],
            ['58%', '#f2f6fa'],
            ['72%', '#dce5ed'],
            ['86%', '#c8d2da'],
            ['100%', '#b0bcc6'],
          ]),
        )
        defs.appendChild(
          lg('gObjBarrel', [
            ['0%', '#a8b4bc'],
            ['12%', '#c8d4dc'],
            ['30%', '#e4ecf2'],
            ['50%', '#f5f8fa'],
            ['70%', '#dce6ec'],
            ['88%', '#c4cfd8'],
            ['100%', '#a4b0b8'],
          ]),
        )
        defs.appendChild(
          lg('gDewShield', [
            ['0%', '#9aa4ae'],
            ['15%', '#c0cad4'],
            ['38%', '#d8e4ec'],
            ['55%', '#dde8f0'],
            ['75%', '#cad4de'],
            ['100%', '#94a0aa'],
          ]),
        )
        defs.appendChild(
          lg('gFocuser', [
            ['0%', '#2a3240'],
            ['15%', '#424e5e'],
            ['32%', '#5c6878'],
            ['50%', '#68788a'],
            ['80%', '#404c5c'],
            ['100%', '#28303c'],
          ]),
        )
        defs.appendChild(
          lg('gEyepiece', [
            ['0%', '#161e28'],
            ['22%', '#222e3c'],
            ['45%', '#2e3e52'],
            ['78%', '#1e2a38'],
            ['100%', '#141c26'],
          ]),
        )
        defs.appendChild(
          lg('gMetalRing', [
            ['0%', '#5a6272'],
            ['20%', '#7e8e9e'],
            ['50%', '#9aaab8'],
            ['80%', '#7c8c9c'],
            ['100%', '#555e6a'],
          ]),
        )
        defs.appendChild(
          lg('gFinder', [
            ['0%', '#1e2630'],
            ['40%', '#323c48'],
            ['60%', '#3a4450'],
            ['100%', '#1e2630'],
          ]),
        )

        svg.appendChild(defs)
        const g = document.createElementNS(ns, 'g')

        function el(tag, attrs) {
          const e = document.createElementNS(ns, tag)
          Object.entries(attrs).forEach(([k, v]) =>
            e.setAttribute(k, String(v)),
          )
          return e
        }

        // ── Ground shadow ──
        g.appendChild(
          el('ellipse', {
            cx: (eyeCX + dewEnd) / 2,
            cy: midY + mH + 9,
            rx: (dewEnd - eyeCX) * 0.44,
            ry: 5,
            fill: 'rgba(0,0,0,0.25)',
          }),
        )

        // ── FINDER SCOPE (top of main tube) ──
        const fsY = midY - mH - 9,
          fsH = 5.5
        const fsX1 = mainSt + mainW * 0.18,
          fsX2 = mainSt + mainW * 0.7
        // Finder body
        g.appendChild(
          el('rect', {
            x: fsX1,
            y: fsY - fsH,
            width: fsX2 - fsX1,
            height: fsH * 2,
            rx: fsH,
            fill: 'url(#gFinder)',
            stroke: '#1a2030',
            'stroke-width': 0.7,
          }),
        )
        g.appendChild(
          el('rect', {
            x: fsX1 + 3,
            y: fsY - fsH + 1.2,
            width: fsX2 - fsX1 - 6,
            height: 2,
            rx: 1,
            fill: 'rgba(255,255,255,0.08)',
          }),
        )
        // Finder eyepiece end (LEFT side of finder)
        g.appendChild(
          el('rect', {
            x: fsX1 - 12,
            y: fsY - fsH - 2.5,
            width: 14,
            height: (fsH + 2.5) * 2,
            rx: fsH + 1,
            fill: '#181e28',
            stroke: '#111820',
            'stroke-width': 0.7,
          }),
        )
        // Finder objective end (RIGHT side of finder)
        g.appendChild(
          el('rect', {
            x: fsX2,
            y: fsY - fsH - 1,
            width: 12,
            height: (fsH + 1) * 2,
            rx: fsH,
            fill: '#1c2430',
            stroke: '#111820',
            'stroke-width': 0.7,
          }),
        )
        // Brackets
        ;[fsX1 + (fsX2 - fsX1) * 0.25, fsX1 + (fsX2 - fsX1) * 0.75].forEach(
          (bx) => {
            g.appendChild(
              el('rect', {
                x: bx - 1.5,
                y: fsY + fsH,
                width: 3,
                height: midY - mH - fsY - fsH,
                rx: 1,
                fill: '#3a4858',
              }),
            )
            g.appendChild(
              el('rect', {
                x: bx - 6,
                y: midY - mH - 2,
                width: 12,
                height: 5,
                rx: 2,
                fill: '#4a5a6a',
                stroke: '#2a3848',
                'stroke-width': 0.6,
              }),
            )
            g.appendChild(
              el('circle', {
                cx: bx,
                cy: midY - mH + 2,
                r: 2,
                fill: '#3a4858',
              }),
            )
          },
        )

        // ── EYE CUP (leftmost) ──
        g.appendChild(
          el('circle', {
            cx: eyeCX,
            cy: midY,
            r: eyeR,
            fill: '#0c1520',
            stroke: '#1c2e44',
            'stroke-width': 2,
          }),
        )
        g.appendChild(
          el('circle', {
            cx: eyeCX,
            cy: midY,
            r: 8,
            fill: 'rgba(20,55,115,0.5)',
            stroke: 'rgba(65,135,215,0.32)',
            'stroke-width': 0.8,
          }),
        )
        g.appendChild(
          el('ellipse', {
            cx: eyeCX - 3,
            cy: midY - 5,
            rx: 3,
            ry: 1.6,
            fill: 'rgba(255,255,255,0.18)',
          }),
        )
        g.appendChild(
          el('ellipse', {
            cx: eyeCX + 2,
            cy: midY + 5,
            rx: 1.5,
            ry: 0.9,
            fill: 'rgba(255,255,255,0.08)',
          }),
        )

        // ── EYEPIECE BARREL ──
        g.appendChild(
          el('rect', {
            x: epBSt,
            y: midY - epH,
            width: epBW,
            height: epH * 2,
            rx: 3,
            fill: 'url(#gEyepiece)',
          }),
        )
        for (let i = 4; i < epBW - 4; i += 3) {
          g.appendChild(
            el('rect', {
              x: epBSt + i,
              y: midY - epH + 1.5,
              width: 1.2,
              height: epH * 2 - 3,
              rx: 0.3,
              fill: 'rgba(0,0,0,0.22)',
            }),
          )
        }
        g.appendChild(
          el('rect', {
            x: epBSt + 4,
            y: midY - epH,
            width: 11,
            height: epH * 2,
            rx: 0,
            fill: 'rgba(180,200,220,0.10)',
            stroke: 'rgba(180,200,220,0.08)',
            'stroke-width': 0.5,
          }),
        )

        // ── EYEPIECE LENS ELEMENTS ──
        {
          const epLH = epH * 1.55,
            lx1 = epBSt + epBW * 0.55
          const ct1 = ep.thick * epLH,
            et1 = Math.max(1.5, ct1 * 0.1),
            cpR1 = ct1 - et1 / 2,
            ht1 = epLH / 2
          const d1 = `M${lx1 + et1 / 2},${midY - ht1} Q${lx1 + cpR1},${midY} ${lx1 + et1 / 2},${midY + ht1} L${lx1 - et1 / 2},${midY + ht1} Q${lx1 - cpR1},${midY} ${lx1 - et1 / 2},${midY - ht1} Z`
          g.appendChild(
            el('path', {
              d: d1,
              fill: 'rgba(80,165,255,0.42)',
              stroke: 'rgba(130,215,255,0.80)',
              'stroke-width': 1.1,
            }),
          )
          g.appendChild(
            el('path', {
              d: `M${lx1 + et1 * 0.3},${midY - ht1 * 0.85} Q${lx1 + ct1 * 0.45},${midY} ${lx1 + et1 * 0.3},${midY + ht1 * 0.85}`,
              stroke: 'rgba(255,255,255,0.34)',
              'stroke-width': 0.9,
              fill: 'none',
            }),
          )
          const lx2 = lx1 + ct1 * 0.9 + 3,
            ct2 = ct1 * 0.72,
            et2 = et1 * 0.85,
            cpR2 = ct2 - et2 / 2,
            ht2 = (epLH * 0.86) / 2
          const d2 = `M${lx2 + et2 / 2},${midY - ht2} Q${lx2 + cpR2},${midY} ${lx2 + et2 / 2},${midY + ht2} L${lx2 - et2 / 2},${midY + ht2} Q${lx2 - cpR2},${midY} ${lx2 - et2 / 2},${midY - ht2} Z`
          g.appendChild(
            el('path', {
              d: d2,
              fill: 'rgba(55,140,225,0.28)',
              stroke: 'rgba(100,185,248,0.52)',
              'stroke-width': 0.7,
            }),
          )
        }

        // ── FOCUSER BODY ──
        g.appendChild(
          el('rect', {
            x: focSt,
            y: midY - focH,
            width: focW,
            height: focH * 2,
            rx: 2,
            fill: 'url(#gFocuser)',
          }),
        )
        // Rack teeth (bottom of focuser)
        for (let i = 0; i < 9; i++) {
          g.appendChild(
            el('rect', {
              x: focSt + 3 + i * 2.4,
              y: midY + focH,
              width: 1.8,
              height: 4,
              rx: 0.6,
              fill: 'rgba(150,190,220,0.25)',
            }),
          )
        }
        g.appendChild(
          el('rect', {
            x: focSt + 2,
            y: midY - focH + 1,
            width: focW - 4,
            height: 2,
            rx: 1,
            fill: 'rgba(255,255,255,0.07)',
          }),
        )

        // Drawtube
        g.appendChild(
          el('rect', {
            x: focEnd - 2,
            y: midY - focH + 4,
            width: 8,
            height: (focH - 4) * 2,
            rx: 1,
            fill: '#202c3c',
            stroke: '#161e2a',
            'stroke-width': 0.5,
          }),
        )

        // COARSE FOCUS KNOB
        const ckX = focSt + focW * 0.38
        const knob = el('ellipse', {
          cx: ckX,
          cy: midY + focH + 9,
          rx: 10,
          ry: 7,
          fill: '#3a4858',
          stroke: '#1e2a38',
          'stroke-width': 1.5,
          id: 'scope-knob',
        })
        g.appendChild(knob)
        for (let i = -4; i <= 4; i++) {
          g.appendChild(
            el('line', {
              x1: ckX + i * 1.6,

              x2: ckX + i * 1.6,
              y2: midY + focH + 15,
              stroke: 'rgba(0,0,0,0.35)',
              'stroke-width': 0.8,
            }),
          )
        }
        g.appendChild(
          el('ellipse', {
            cx: ckX - 2,
            cy: midY + focH + 6,
            rx: 3.5,
            ry: 2,
            fill: 'rgba(255,255,255,0.15)',
          }),
        )

        // FINE FOCUS KNOB
        const fkX = focSt + focW * 0.75
        const fknob = el('ellipse', {
          cx: fkX,
          cy: midY + focH + 8,
          rx: 7,
          ry: 5,
          fill: '#2e3a4a',
          stroke: '#1a2430',
          'stroke-width': 1.2,
          id: 'scope-knob-fine',
        })
        g.appendChild(fknob)
        g.appendChild(
          el('ellipse', {
            cx: fkX - 1.5,
            cy: midY + focH + 5.5,
            rx: 2.5,
            ry: 1.5,
            fill: 'rgba(255,255,255,0.11)',
          }),
        )

        // ── FOCUSER → TUBE TAPER ──
        g.appendChild(
          el('polygon', {
            points: `${focEnd},${midY - focH} ${mainSt},${midY - mH} ${mainSt},${midY + mH} ${focEnd},${midY + focH}`,
            fill: '#c0ccda',
          }),
        )

        // ── MAIN WHITE TUBE ──
        g.appendChild(
          el('rect', {
            x: mainSt,
            y: midY - mH,
            width: mainW,
            height: mH * 2,
            rx: 2,
            fill: 'url(#gWhiteTube)',
          }),
        )
        g.appendChild(
          el('rect', {
            x: mainSt + 6,
            y: midY - mH + 1.5,
            width: mainW - 12,
            height: 3,
            rx: 1.5,
            fill: 'rgba(255,255,255,0.22)',
          }),
        )
        g.appendChild(
          el('rect', {
            x: mainSt + 6,
            y: midY + mH - 3.5,
            width: mainW - 12,
            height: 2,
            rx: 1,
            fill: 'rgba(0,0,0,0.08)',
          }),
        )

        // RED ACCENT STRIPE
        const redX = mainEnd - mainW * 0.15
        g.appendChild(
          el('rect', {
            x: redX,
            y: midY - mH,
            width: 6,
            height: mH * 2,
            fill: '#cc2222',
          }),
        )
        g.appendChild(
          el('rect', {
            x: redX + 1,
            y: midY - mH,
            width: 2,
            height: mH * 2,
            fill: 'rgba(255,120,120,0.35)',
          }),
        )

        // Tube rings
        ;[mainW * 0.32, mainW * 0.65].forEach((dx) => {
          const rx = mainSt + dx
          g.appendChild(
            el('rect', {
              x: rx - 4,
              y: midY - mH - 2,
              width: 8,
              height: mH * 2 + 4,
              rx: 2,
              fill: 'url(#gMetalRing)',
            }),
          )
          g.appendChild(
            el('rect', {
              x: rx - 4,
              y: midY - mH - 2,
              width: 8,
              height: 3,
              rx: 1,
              fill: 'rgba(255,255,255,0.12)',
            }),
          )
        })

        // Logo label area
        g.appendChild(
          el('rect', {
            x: mainSt + mainW * 0.32,
            y: midY - mH + 5,
            width: mainW * 0.26,
            height: mH * 2 - 10,
            rx: 2,
            fill: 'rgba(255,255,255,0.04)',
            stroke: 'rgba(255,255,255,0.05)',
            'stroke-width': 0.5,
          }),
        )

        // ── TUBE → OBJECTIVE TAPER ──
        g.appendChild(
          el('polygon', {
            points: `${mainEnd},${midY - mH} ${objSt},${midY - objH} ${objSt},${midY + objH} ${mainEnd},${midY + mH}`,
            fill: '#c8d4dc',
          }),
        )
        g.appendChild(
          el('polygon', {
            points: `${mainEnd},${midY - mH} ${objSt},${midY - objH} ${objSt},${midY - objH + 4} ${mainEnd},${midY - mH + 3}`,
            fill: 'rgba(255,255,255,0.18)',
          }),
        )

        // ── OBJECTIVE CELL ──
        g.appendChild(
          el('rect', {
            x: objSt,
            y: midY - objH,
            width: objBW,
            height: objH * 2,
            rx: 3,
            fill: 'url(#gObjBarrel)',
          }),
        )
        ;[6, 14].forEach((dx) => {
          g.appendChild(
            el('rect', {
              x: objSt + dx,
              y: midY - objH,
              width: 2.5,
              height: objH * 2,
              fill: 'rgba(0,0,0,0.10)',
              rx: 0.5,
            }),
          )
        })

        // Objective doublet (visible at LEFT edge of cell, facing main tube)
        {
          const lx = objSt + 8,
            lh = objH * 1.65
          const ct = obj.thick * lh,
            et = Math.max(2, ct * 0.11),
            cpR = ct - et / 2,
            ht = lh / 2
          const d = `M${lx + et / 2},${midY - ht} Q${lx + cpR},${midY} ${lx + et / 2},${midY + ht} L${lx - et / 2},${midY + ht} Q${lx - cpR},${midY} ${lx - et / 2},${midY - ht} Z`
          g.appendChild(
            el('path', {
              d,
              fill: 'rgba(80,165,255,0.45)',
              stroke: 'rgba(140,220,255,0.85)',
              'stroke-width': 1.3,
            }),
          )
          g.appendChild(
            el('path', {
              d: `M${lx + et * 0.3},${midY - ht * 0.82} Q${lx + ct * 0.44},${midY} ${lx + et * 0.3},${midY + ht * 0.82}`,
              stroke: 'rgba(255,255,255,0.38)',
              'stroke-width': 1.0,
              fill: 'none',
            }),
          )
          const lx2 = lx + ct + 3,
            ct2 = ct * 0.6,
            et2 = et * 0.8,
            cpR2 = ct2 - et2 / 2
          const d2 = `M${lx2 + et2 / 2},${midY - ht} Q${lx2 + cpR2},${midY} ${lx2 + et2 / 2},${midY + ht} L${lx2 - et2 / 2},${midY + ht} Q${lx2 - cpR2},${midY} ${lx2 - et2 / 2},${midY - ht} Z`
          g.appendChild(
            el('path', {
              d: d2,
              fill: 'rgba(50,130,220,0.28)',
              stroke: 'rgba(100,185,245,0.55)',
              'stroke-width': 0.7,
            }),
          )
        }

        // ── DEW SHIELD (rightmost, widest) ──
        g.appendChild(
          el('rect', {
            x: dewSt,
            y: midY - dewH,
            width: dewW,
            height: dewH * 2,
            rx: 5,
            fill: 'url(#gDewShield)',
          }),
        )
        // Front opening (RIGHT end)
        g.appendChild(
          el('rect', {
            x: dewEnd - 5,
            y: midY - dewH,
            width: 5,
            height: dewH * 2,
            rx: 3,
            fill: 'rgba(0,0,0,0.35)',
          }),
        )
        ;[10, 22, 34].forEach((dx) => {
          g.appendChild(
            el('rect', {
              x: dewSt + dx,
              y: midY - dewH,
              width: 2.5,
              height: dewH * 2,
              fill: 'rgba(0,0,0,0.12)',
              rx: 0.5,
            }),
          )
        })
        // Objective glass visible at RIGHT opening
        g.appendChild(
          el('ellipse', {
            cx: dewEnd - 3,
            cy: midY,
            rx: 3.5,
            ry: dewH - 4,
            fill: 'rgba(20,70,140,0.55)',
            stroke: 'rgba(60,140,220,0.4)',
            'stroke-width': 0.8,
          }),
        )
        g.appendChild(
          el('ellipse', {
            cx: dewEnd - 4.5,
            cy: midY - 8,
            rx: 1.6,
            ry: 1,
            fill: 'rgba(255,255,255,0.18)',
          }),
        )

        // ── INTERNAL LIGHT PATH ──
        g.appendChild(
          el('line', {
            x1: eyeCX + eyeR + 2,
            y1: midY,
            x2: dewEnd - 6,
            y2: midY,
            stroke: 'rgba(100,190,255,0.07)',
            'stroke-width': 1,
            'stroke-dasharray': '8,7',
          }),
        )

        // ── Naked-eye dim overlay ──
        if (S.mode === 'naked') {
          g.appendChild(
            el('rect', {
              x: L,
              y: 0,
              width: dewEnd - L + 8,
              height: TH,
              fill: 'rgba(0,0,0,0.60)',
              rx: 5,
            }),
          )
          const dimTxt = document.createElementNS(ns, 'text')
          dimTxt.setAttribute('x', String((eyeCX + dewEnd) / 2))
          dimTxt.setAttribute('y', String(midY + 5))
          dimTxt.setAttribute('text-anchor', 'middle')
          dimTxt.setAttribute('font-size', '12')
          dimTxt.setAttribute(
            'font-family',
            'PingFang SC,Microsoft YaHei,sans-serif',
          )
          dimTxt.setAttribute('fill', 'rgba(167,139,250,0.45)')
          dimTxt.textContent = '望远镜未使用'
          g.appendChild(dimTxt)
        }

        svg.appendChild(g)
      }

      // ── Lens Card UI (no numbers) ────────────────────────
      function lensCardSVG(focal, thick, h, isEp) {
        const ct = thick * h,
          et = Math.max(2.0, ct * 0.1),
          cpR = ct - et / 2,
          ht = h / 2
        const vw = Math.max(ct * 2 + 10, 22),
          vcx = vw / 2
        const d = `M${vcx + et / 2},2 Q${vcx + cpR},${h / 2 + 2} ${vcx + et / 2},${h + 2} L${vcx - et / 2},${h + 2} Q${vcx - cpR},${h / 2 + 2} ${vcx - et / 2},2 Z`
        const gid = `lg_${isEp ? 'e' : 'o'}_${focal}`
        return `<svg width="${vw}" height="${h + 4}" viewBox="0 0 ${vw} ${h + 4}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="rgba(40,100,185,0.58)"/>
        <stop offset="45%"  stop-color="rgba(120,200,255,0.70)"/>
        <stop offset="100%" stop-color="rgba(40,100,185,0.58)"/>
      </linearGradient>
    </defs>
    <path d="${d}" fill="url(#${gid})" stroke="rgba(110,190,255,0.48)" stroke-width="0.8"/>
  </svg>`
      }

      function buildLensCards() {
        const epCon = document.getElementById('ep-options')
        const objCon = document.getElementById('obj-options')
        epCon.innerHTML = objCon.innerHTML = ''
        const disabled = S.mode === 'naked'

        EYEPIECES.forEach((ep) => {
          const card = document.createElement('div')
          card.className =
            'lens-card' +
            (ep.f === S.ep ? ' selected' : '') +
            (disabled ? ' disabled' : '')
          let html = lensCardSVG(ep.f, ep.thick, 26, true)
          if (S.showFocal) {
            html += `<div class="lens-kind">${ep.f}mm</div>`
          } else {
            html += `<div class="lens-kind" style="opacity:0;">${ep.f}mm</div>`
          }
          card.innerHTML = html
          if (!disabled)
            card.addEventListener('click', () => changeLens('ep', ep.f))
          epCon.appendChild(card)
        })

        OBJECTIVES.forEach((ob) => {
          const card = document.createElement('div')
          card.className =
            'lens-card' +
            (ob.f === S.obj ? ' selected' : '') +
            (disabled ? ' disabled' : '')
          let html = lensCardSVG(ob.f, ob.thick, 34, false)
          if (S.showFocal) {
            html += `<div class="lens-kind">${ob.f}mm</div>`
          } else {
            html += `<div class="lens-kind" style="opacity:0;">${ob.f}mm</div>`
          }
          card.innerHTML = html
          if (!disabled)
            card.addEventListener('click', () => changeLens('obj', ob.f))
          objCon.appendChild(card)
        })
      }

      // ── Mode / Lens Changes ───────────────────────────────
      function setMode(mode) {
        if (S.mode === mode) return
        S.mode = mode
        S.focused = mode === 'naked'
        S.focusing = false
        S.blur = mode === 'naked' ? 0 : S.focused ? 0 : 12

        document
          .getElementById('mode-scope-btn')
          .classList.toggle('active', mode === 'scope')
        document
          .getElementById('mode-naked-btn')
          .classList.toggle('active', mode === 'naked')

        const btn = document.getElementById('focus-btn')
        if (mode === 'naked') {
          btn.disabled = true
          document.getElementById('focus-icon').textContent = '—'
          document.getElementById('focus-label').textContent = '无需对焦'
        } else {
          btn.disabled = false
          document.getElementById('focus-icon').textContent = '⊙'
          document.getElementById('focus-label').textContent = '自动对焦'
          S.focused = false
          S.blur = 12
        }

        updateStatus()
        buildLensCards()
        buildScopeSVG()
        drawOverlay()
      }

      function changeLens(type, val) {
        if (type === 'ep') S.ep = val
        else S.obj = val
        S.focused = false
        S.focusing = false
        S.blur = 12
        const icon = document.getElementById('focus-icon')
        icon.className = ''
        icon.textContent = '⊙'
        document.getElementById('focus-label').textContent = '自动对焦'
        document.getElementById('focus-btn').disabled = false
        updateStatus()
        buildLensCards()
        buildScopeSVG()
      }

      function updateStatus() {
        const dot = document.getElementById('focus-dot')
        const ftxt = document.getElementById('focus-text')
        if (S.mode === 'naked' || S.focused) {
          dot.classList.add('on')
          ftxt.textContent = S.mode === 'naked' ? '肉眼' : '已对焦'
        } else {
          dot.classList.remove('on')
          ftxt.textContent = S.focusing ? '对焦中…' : '未对焦'
        }
      }

      // ── Auto-Focus ────────────────────────────────────────
      function triggerFocus() {
        if (S.focusing || S.mode === 'naked') return
        S.focusing = true
        S.focused = false

        const btn = document.getElementById('focus-btn')
        const icon = document.getElementById('focus-icon')
        const lbl = document.getElementById('focus-label')
        btn.disabled = true
        icon.className = 'spin-icon'
        icon.textContent = '◎'
        lbl.textContent = '对焦中…'
        updateStatus()
        showPulseRing()
        animateKnob()

        const t0 = performance.now(),
          dur = 1900,
          startBlur = S.blur
        ;(function step(now) {
          const t = Math.min(1, (now - t0) / dur)
          const ease = 1 - Math.pow(1 - t, 3)
          S.blur = startBlur * (1 - ease)
          if (t < 1) {
            requestAnimationFrame(step)
          } else {
            S.blur = 0
            S.focused = true
            S.focusing = false
            btn.disabled = false
            icon.className = ''
            icon.textContent = '✓'
            lbl.textContent = '对焦成功'
            updateStatus()
            setTimeout(() => {
              icon.textContent = '⊙'
              lbl.textContent = '自动对焦'
            }, 2800)
          }
        })(performance.now())
      }

      function animateKnob() {
        const knob = document.getElementById('scope-knob')
        const fine = document.getElementById('scope-knob-fine')
        if (!knob) return
        const bx = parseFloat(knob.getAttribute('cx'))
        const t0 = performance.now()
        ;(function step(now) {
          const t = Math.min(1, (now - t0) / 1900)
          const w = Math.sin(t * Math.PI * 12) * 6 * (1 - t)
          knob.setAttribute('cx', String(bx + w))
          if (fine)
            fine.setAttribute(
              'cx',
              String(parseFloat(fine.getAttribute('cx')) + w * 0.4),
            )
          if (t < 1) requestAnimationFrame(step)
          else knob.setAttribute('cx', String(bx))
        })(performance.now())
      }

      function showPulseRing() {
        const sec = document.getElementById('view-section')
        const ring = document.createElement('div')
        ring.className = 'focus-ring-anim'
        const sz = VR * 0.82
        Object.assign(ring.style, {
          width: `${sz * 2}px`,
          height: `${sz * 2}px`,
          left: `${CW / 2 - sz}px`,
          top: `${CH / 2 - sz}px`,
        })
        sec.appendChild(ring)
        setTimeout(() => ring.remove(), 950)
      }

      function clampNakedOffsets() {
        const boardHalfW = getGridCellSize(S.nakedZoom) * 80
        const boardHalfH = boardHalfW
        const maxOffsetX = Math.max(0, boardHalfW - CW * 0.2)
        const maxOffsetY = Math.max(0, boardHalfH - CH * 0.2)
        S.nakedOffsetX = clamp(S.nakedOffsetX, -maxOffsetX, maxOffsetX)
        S.nakedOffsetY = clamp(S.nakedOffsetY, -maxOffsetY, maxOffsetY)
      }

      function snapNakedOffsetsToGrid() {
        const sp = getGridCellSize(S.nakedZoom)
        if (!sp) return

        // 让“视口边缘”落在格线上，而不是只让 offset 自身对齐
        const alignedCenterX = Math.round((CW / 2 + S.nakedOffsetX) / sp) * sp
        const alignedCenterY = Math.round((CH / 2 + S.nakedOffsetY) / sp) * sp
        S.nakedOffsetX = alignedCenterX - CW / 2
        S.nakedOffsetY = alignedCenterY - CH / 2
        clampNakedOffsets()
      }

      function setNakedZoom(nextZoom, anchorX = CW / 2, anchorY = CH / 2) {
        const prevZoom = S.nakedZoom
        const zoom = clamp(nextZoom, 1, 8)
        if (zoom === prevZoom) return

        const relX = anchorX - CW / 2 - S.nakedOffsetX
        const relY = anchorY - CH / 2 - S.nakedOffsetY
        const scale = zoom / prevZoom

        S.nakedOffsetX = anchorX - CW / 2 - relX * scale
        S.nakedOffsetY = anchorY - CH / 2 - relY * scale
        S.nakedZoom = zoom
        clampNakedOffsets()
      }

      function getTouchDistance(touches) {
        const [a, b] = touches
        return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY)
      }

      function bindViewInteractions() {
        const sec = document.getElementById('view-section')
        if (!sec) return

        sec.addEventListener(
          'wheel',
          (e) => {
            if (S.mode !== 'naked') return
            e.preventDefault()
            const factor = e.deltaY < 0 ? 1.12 : 0.9
            const rect = sec.getBoundingClientRect()
            setNakedZoom(
              S.nakedZoom * factor,
              e.clientX - rect.left,
              e.clientY - rect.top,
            )
            snapNakedOffsetsToGrid()
          },
          { passive: false },
        )

        sec.addEventListener('mousedown', (e) => {
          if (S.mode !== 'naked' || S.nakedZoom <= 1) return
          isDraggingNaked = true
          dragStartX = e.clientX
          dragStartY = e.clientY
          dragOriginX = S.nakedOffsetX
          dragOriginY = S.nakedOffsetY
          sec.style.cursor = 'grabbing'
        })

        window.addEventListener('mousemove', (e) => {
          if (!isDraggingNaked || S.mode !== 'naked') return
          S.nakedOffsetX = dragOriginX + (e.clientX - dragStartX)
          S.nakedOffsetY = dragOriginY + (e.clientY - dragStartY)
          clampNakedOffsets()
        })

        window.addEventListener('mouseup', () => {
          if (isDraggingNaked && S.mode === 'naked') snapNakedOffsetsToGrid()
          isDraggingNaked = false
          sec.style.cursor = ''
        })

        sec.addEventListener(
          'touchstart',
          (e) => {
            if (S.mode !== 'naked') return
            if (e.touches.length === 2) {
              pinchStartDist = getTouchDistance(e.touches)
              pinchStartZoom = S.nakedZoom
              isDraggingNaked = false
              return
            }
            if (e.touches.length === 1 && S.nakedZoom > 1) {
              isDraggingNaked = true
              dragStartX = e.touches[0].clientX
              dragStartY = e.touches[0].clientY
              dragOriginX = S.nakedOffsetX
              dragOriginY = S.nakedOffsetY
            }
          },
          { passive: true },
        )

        sec.addEventListener(
          'touchmove',
          (e) => {
            if (S.mode !== 'naked') return
            if (e.touches.length === 2 && pinchStartDist) {
              e.preventDefault()
              const dist = getTouchDistance(e.touches)
              if (dist > 0) {
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2
                const rect = sec.getBoundingClientRect()
                setNakedZoom(
                  pinchStartZoom * (dist / pinchStartDist),
                  midX - rect.left,
                  midY - rect.top,
                )
              }
              return
            }
            if (e.touches.length === 1 && isDraggingNaked && S.nakedZoom > 1) {
              e.preventDefault()
              S.nakedOffsetX = dragOriginX + (e.touches[0].clientX - dragStartX)
              S.nakedOffsetY = dragOriginY + (e.touches[0].clientY - dragStartY)
              clampNakedOffsets()
            }
          },
          { passive: false },
        )

        const resetInteractions = () => {
          if ((pinchStartDist || isDraggingNaked) && S.mode === 'naked')
            snapNakedOffsetsToGrid()
          pinchStartDist = 0
          isDraggingNaked = false
          sec.style.cursor = ''
        }
        sec.addEventListener('touchend', resetInteractions)
        sec.addEventListener('touchcancel', resetInteractions)
      }

      // ── Init ──────────────────────────────────────────────
      function init() {
        resizeCanvases()
        buildLensCards()
        buildScopeSVG()
        bindViewInteractions()
        updateStatus()
        requestAnimationFrame(renderScene)
      }

      window.addEventListener('resize', () => {
        resizeCanvases()
        buildScopeSVG()
      })
      if (document.readyState === 'loading')
        document.addEventListener('DOMContentLoaded', init)
      else init()
    </script>
